{% extends 'base.html' %}
{% load static %}


{% block title %}ログイン{% endblock %}
{% block content_title %}<h3>ログイン画面</h3>{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <!-- ★ role を POST で保持 -->

    <button type="submit">ログイン</button>
</form>
{% endblock %}
